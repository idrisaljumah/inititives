<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المخطط الزمني للمسارات السريرية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
            background-image: linear-gradient(135deg, #f5f7fa 0%, #e4eff9 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 25px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .header-buttons {
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-start;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            background-color: #062A40;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(6, 42, 64, 0.2);
        }
        .back-button:hover {
            background-color: #0a3d5c;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(6, 42, 64, 0.3);
        }
        .back-button i {
            margin-left: 8px;
            font-size: 14px;
        }
        h1 {
            text-align: center;
            color: #062A40;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            font-size: 2.2rem;
            padding-bottom: 15px;
            position: relative;
        }
        h1:after {
            content: '';
            position: absolute;
            width: 120px;
            height: 5px;
            background: linear-gradient(90deg, #2196F3, #0D47A1);
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
        }
        .timeline-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
            padding-bottom: 15px;
            margin-bottom: 30px;
            border: 1px solid #eee;
        }
        .timeline-container {
            position: relative;
            padding-top: 60px;
            min-width: 2400px; 
            background-color: #fff;
        }
        .timeline-header {
            position: absolute;
            top: 0;
            right: 280px; 
            left: 0;
            height: 60px;
            background: linear-gradient(to bottom, #fdfdfd, #f4f4f4);
            border-bottom: 2px solid #e0e0e0;
            z-index: 2;
        }
        .year-labels {
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 25px;
            display: flex;
            background-color: #eaeaea;
            border-bottom: 1px solid #ddd;
            padding-top: 3px;
        }
        .year-label {
            font-weight: 800;
            color: #062A40;
            font-size: 14px;
            border-left: 1px solid #ccc;
        }
        .month-markers {
            position: absolute;
            top: 25px;
            right: 0;
            left: 0;
            height: 35px;
            display: flex;
        }
        .month-section {
            position: relative;
            height: 100%;
            border-left: 1px solid #ccc; 
        }
        .month-labels {
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            display: flex;
            justify-content: space-around;
            padding-top: 8px;
        }
        .month-label {
            font-size: 12px;
            color: #555;
            font-weight: 600;
            transform: translateX(50%);
            border-right: 1px solid #eee;
            width: 100%;
            text-align: center;
        }
        /* Today Marker - Adjusted z-index and pointer-events */
        .today-marker {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background-color: #ff4757;
            z-index: 4; 
            pointer-events: none;
            box-shadow: 0 0 5px rgba(255, 71, 87, 0.5);
        }
        .today-label {
            position: absolute;
            top: 65px;
            transform: translateX(50%);
            background-color: #ff4757;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
        }
        .task-container {
            background-color: #fff;
            padding-top: 15px;
        }
        .task {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            position: relative;
            transition: background-color 0.2s ease;
            border-radius: 8px;
        }
        .task:hover {
            background-color: #f4f8fb;
        }
        .task-name {
            width: 280px;
            min-width: 280px;
            padding: 12px 15px;
            font-weight: 600;
            font-size: 13px;
            text-align: right;
            background-color: #f0f4f8;
            border-radius: 8px 0 0 8px;
            border-right: 4px solid #2196F3;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.02);
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            position: sticky;
            right: 0;
            z-index: 5; 
        }
        .timeline-bar {
            flex-grow: 1;
            position: relative;
            height: 45px;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 49px, #f5f5f5 49px, #f5f5f5 50px);
            border-radius: 0 8px 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .task-bar {
            position: absolute;
            height: 35px;
            top: 5px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-width: 40px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            z-index: 3;
        }
        .task-bar:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.2);
        }
        .tooltip {
            position: absolute;
            background-color: #1a1a1a;
            color: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 100;
            width: 320px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            transform: translateY(10px);
            text-align: right;
            border: 1px solid #333;
        }
        .tooltip-visible {
            opacity: 1;
            transform: translateY(0);
        }
        .tooltip-history {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed #555;
        }
        .tooltip-history-title {
            font-weight: bold;
            color: #8ab4f8;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #ccc;
            margin-bottom: 4px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            background-color: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #eee;
        }
        .legend-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            background-color: #f9f9f9;
            border: 1px solid #eee;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            margin-left: 8px;
        }
        .status-dropdown {
            position: absolute;
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            z-index: 100;
            display: none;
            overflow: hidden;
            min-width: 150px;
        }
        .status-option {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background-color 0.2s;
            text-align: right;
        }
        .status-option:hover {
            background-color: #f0f4f8;
        }
        .current-date {
            text-align: center;
            margin-bottom: 25px;
            font-size: 15px;
            color: #062A40;
            font-weight: bold;
            background-color: #e4eff9;
            padding: 10px;
            border-radius: 6px;
            display: inline-block;
            margin-left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-buttons">
            <a href="initiative-clinical-pathways.html" class="back-button">
                <i class="fas fa-arrow-right"></i> العودة إلى مبادرة تقوية المسارات السريرية
            </a>
        </div>
        
        <h1>المخطط الزمني للمسارات السريرية (٢٠٢٤ - ٢٠٢٨)</h1>
        <div class="current-date" id="current-date"></div>
        
        <div class="timeline-scroll-wrapper">
            <div class="timeline-container" id="timeline-container">
                <div class="timeline-header">
                    <div class="year-labels" id="year-labels"></div>
                    <div class="month-markers" id="month-markers"></div>
                </div>
                
                <div id="today-marker" class="today-marker">
                    <div class="today-label">اليوم</div>
                </div>

                <div id="tasks-container" class="task-container"></div>
            </div>
        </div>
        
        <div style="background-color: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;">
            <h3 style="margin-top: 0; color: #062A40; font-size: 16px;">نسبة إنجاز المشروع الكلية</h3>
            <div style="height: 25px; background-color: #eef2f5; border-radius: 15px; overflow: hidden; position: relative;">
                <div id="progress-bar" style="height: 100%; width: 0%; background: linear-gradient(90deg, #2196F3, #0D47A1); border-radius: 15px; transition: width 1s cubic-bezier(0.25, 0.8, 0.25, 1);">
                    <span id="progress-text" style="position: absolute; right: 15px; top: 4px; color: white; font-weight: bold; font-size: 13px;">0%</span>
                </div>
            </div>
        </div>
        
        <div class="legend" id="legend"></div>
        
        <div id="tooltip" class="tooltip"></div>
        <div id="status-dropdown" class="status-dropdown"></div>
    </div>

    <script>
        const tasks = [
            { id: 1, name: "البحث الأولي وجمع البيانات", startDate: "2024-09-20", endDate: "2025-03-20", status: "أنتهت", details: "تم جمع البيانات الأولية وإجراء البحث المطلوب لتحديد نطاق المشروع" },
            { id: 2, name: "إشراك أصحاب المصلحة والتشاور معهم", startDate: "2025-03-21", endDate: "2025-04-30", status: "أنتهت", details: "تم عقد اجتماعات مع الكادر الصحي لجمع المتطلبات" },
            { id: 3, name: "صياغة المسار السريري", startDate: "2025-05-01", endDate: "2026-03-31", status: "أنتهت", details: "صياغة المسار السريري وتقييم المتطلبات" },
            { id: 4, name: "مراجعة المسار السريري", startDate: "2026-04-01", endDate: "2026-06-30", status: "في تقدم", details: "مراجعة المسار السريري من قبل الفريق وجمع الملاحظات" },
            { id: 5, name: "التنقيح والصياغة النهائية", startDate: "2026-07-01", endDate: "2026-07-31", status: "لم تبدأ", details: "تنقيح المسار السريري بناءً على الملاحظات" },
            { id: 6, name: "عملية الموافقة والإعتماد", startDate: "2026-07-01", endDate: "2026-10-01", status: "لم تبدأ", details: "الحصول على الموافقات واعتماد المسار" },
            { id: 7, name: "التخطيط للتدريب والتنفيذ", startDate: "2026-07-31", endDate: "2026-10-01", status: "لم تبدأ", details: "إعداد خطة التدريب وتحديد الموارد" },
            { id: 8, name: "التنفيذ والبدء التجريبي", startDate: "2026-10-02", endDate: "2027-01-30", status: "لم تبدأ", details: "تنفيذ تجريبي وجمع الملاحظات للتحسين" },
            { id: 9, name: "التعميم على جميع المستشفيات", startDate: "2027-01-31", endDate: "2027-06-30", status: "لم تبدأ", details: "تعميم المسار السريري بعد نجاح المرحلة التجريبية" },
            { id: 10, name: "المراقبة والتقييم المستدام", startDate: "2027-07-01", endDate: "2028-12-31", status: "لم تبدأ", details: "مراقبة التنفيذ وتقييم النتائج حتى نهاية المشروع" }
        ];

        const statusColors = {
            "أنتهت": "#10B981",    
            "في تقدم": "#3B82F6",  
            "متأخر": "#EF4444",    
            "متوقف": "#F59E0B",    
            "لم تبدأ": "#9CA3AF"   
        };

        const earliestDate = new Date("2024-09-01");
        const latestDate = new Date("2028-12-31"); 

        function getCurrentOmanDate() {
            const now = new Date();
            const omanOffset = 4 * 60; 
            const localOffset = now.getTimezoneOffset();
            return new Date(now.getTime() + (omanOffset + localOffset) * 60 * 1000);
        }

        let today = getCurrentOmanDate();

        function calculateProgress() {
            const completed = tasks.filter(task => task.status === "أنتهت").length;
            return Math.round((completed / tasks.length) * 100);
        }

        function formatDisplayDate(date) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('ar-OM', options);
        }

        function formatShortDate(dateStr) {
            const d = new Date(dateStr);
            return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
        }

        // Fix: Accurately get the width of just the timeline tracking area
        function getTimelineWidth() {
            const header = document.querySelector('.timeline-header');
            return header ? header.offsetWidth : (document.getElementById('timeline-container').offsetWidth - 280); 
        }

        function dateToPosition(date) {
            const timelineWidth = getTimelineWidth();
            const totalDays = (latestDate - earliestDate) / (1000 * 60 * 60 * 24);
            const daysPassed = (date - earliestDate) / (1000 * 60 * 60 * 24);
            let fraction = daysPassed / totalDays;
            if(fraction < 0) fraction = 0;
            if(fraction > 1) fraction = 1;
            return fraction * timelineWidth;
        }

        const arabicMonths = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

        function generateYearLabels() {
            const container = document.getElementById('year-labels');
            container.innerHTML = '';
            for (let year = earliestDate.getFullYear(); year <= latestDate.getFullYear(); year++) {
                const yStart = new Date(year, 0, 1) < earliestDate ? earliestDate : new Date(year, 0, 1);
                const yEnd = new Date(year, 11, 31) > latestDate ? latestDate : new Date(year, 11, 31);
                
                const startPos = dateToPosition(yStart);
                const endPos = dateToPosition(yEnd);
                
                const el = document.createElement('div');
                el.className = 'year-label';
                el.textContent = year;
                el.style.position = 'absolute';
                el.style.right = `${startPos}px`;
                el.style.width = `${endPos - startPos}px`;
                el.style.textAlign = 'center';
                container.appendChild(el);
            }
        }

        function generateMonthMarkers() {
            const container = document.getElementById('month-markers');
            container.innerHTML = '';
            for (let year = earliestDate.getFullYear(); year <= latestDate.getFullYear(); year++) {
                const yStart = new Date(year, 0, 1) < earliestDate ? earliestDate : new Date(year, 0, 1);
                const yEnd = new Date(year, 11, 31) > latestDate ? latestDate : new Date(year, 11, 31);
                const startPos = dateToPosition(yStart);
                const endPos = dateToPosition(yEnd);
                
                const section = document.createElement('div');
                section.className = 'month-section';
                section.style.position = 'absolute';
                section.style.right = `${startPos}px`;
                section.style.width = `${endPos - startPos}px`;
                
                const mContainer = document.createElement('div');
                mContainer.className = 'month-labels';
                const sMonth = yStart.getMonth();
                const eMonth = yEnd.getMonth();
                
                for (let m = 0; m <= 11; m++) {
                    if ((year === earliestDate.getFullYear() && m < sMonth) || (year === latestDate.getFullYear() && m > eMonth)) continue;
                    const label = document.createElement('div');
                    label.className = 'month-label';
                    label.textContent = arabicMonths[m];
                    const mPos = (m - sMonth) / (eMonth - sMonth + 1);
                    label.style.right = `${mPos * 100}%`;
                    mContainer.appendChild(label);
                }
                section.appendChild(mContainer);
                container.appendChild(section);
            }
        }

        function drawTodayMarker() {
            const marker = document.getElementById('today-marker');
            if (today >= earliestDate && today <= latestDate) {
                marker.style.display = 'block';
                // Fix: Add 280px offset since it is relative to .timeline-container
                const position = dateToPosition(today);
                marker.style.right = `${position + 280}px`;
            } else {
                marker.style.display = 'none';
            }
        }

        function determineStatus(task) {
            const tStart = new Date(task.startDate);
            const tEnd = new Date(task.endDate);
            if (today < tStart) return "لم تبدأ";
            if (today > tEnd) return task.status; 
            if (task.status === "متأخر" || task.status === "متوقف") return task.status;
            return "في تقدم";
        }

        function renderTasks() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';
            
            tasks.forEach(task => {
                const el = document.createElement('div');
                el.className = 'task';
                
                const nameEl = document.createElement('div');
                nameEl.className = 'task-name';
                nameEl.textContent = task.name;
                
                const timelineBar = document.createElement('div');
                timelineBar.className = 'timeline-bar';
                
                const startPos = dateToPosition(new Date(task.startDate));
                const endPos = dateToPosition(new Date(task.endDate));
                
                const taskBar = document.createElement('div');
                taskBar.className = 'task-bar';
                taskBar.dataset.taskId = task.id;
                taskBar.style.right = `${startPos}px`;
                taskBar.style.width = `${endPos - startPos}px`;
                taskBar.style.backgroundColor = statusColors[task.status];
                taskBar.textContent = task.status;
                if (task.status === "متوقف") taskBar.style.color = "#000";
                
                taskBar.addEventListener('mouseenter', showTooltip);
                taskBar.addEventListener('mouseleave', hideTooltip);
                taskBar.addEventListener('click', showStatusDropdown);
                
                timelineBar.appendChild(taskBar);
                el.appendChild(nameEl);
                el.appendChild(timelineBar);
                container.appendChild(el);
            });
        }

        function showTooltip(e) {
            const taskId = parseInt(e.target.dataset.taskId);
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            let historyHtml = '';
            if (task.history && task.history.length > 0) {
                historyHtml = `<div class="tooltip-history">
                    <div class="tooltip-history-title"><i class="fas fa-history"></i> سجل التغييرات:</div>
                    ${task.history.map(h => `
                        <div class="history-item">
                            <span>${h.status}</span>
                            <span>${new Date(h.date).toLocaleDateString('ar-OM', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                    `).join('')}
                </div>`;
            }

            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `
                <div style="font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #64B5F6;">${task.name}</div>
                <div><strong>الحالة الحالية:</strong> <span style="color:${statusColors[task.status]}">${task.status}</span></div>
                <div><strong>الفترة:</strong> ${formatShortDate(task.startDate)} - ${formatShortDate(task.endDate)}</div>
                <div style="margin-top: 8px; line-height: 1.4; color: #bbb;">${task.details}</div>
                ${historyHtml}
            `;
            
            const rect = e.target.getBoundingClientRect();
            tooltip.style.top = `${rect.top + window.scrollY - tooltip.offsetHeight - 15}px`;
            tooltip.style.left = `${rect.left + (rect.width / 2) - (tooltip.offsetWidth / 2)}px`;
            tooltip.classList.add('tooltip-visible');
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('tooltip-visible');
        }

        function showStatusDropdown(e) {
            // Fix: Stop click event propagation so it doesn't immediately close via document click listener
            e.stopPropagation();
            
            const taskId = parseInt(e.target.dataset.taskId);
            const dropdown = document.getElementById('status-dropdown');
            dropdown.innerHTML = '';
            dropdown.style.display = 'block';
            
            Object.entries(statusColors).forEach(([status, color]) => {
                const opt = document.createElement('div');
                opt.className = 'status-option';
                opt.textContent = status;
                opt.style.borderRight = `4px solid ${color}`;
                if (status === "متوقف") opt.style.color = "#000";
                
                opt.addEventListener('click', (event) => {
                    event.stopPropagation();
                    changeTaskStatus(taskId, status);
                });
                dropdown.appendChild(opt);
            });
            
            const rect = e.target.getBoundingClientRect();
            dropdown.style.top = `${rect.bottom + window.scrollY + 5}px`;
            dropdown.style.left = `${rect.left}px`;
            
            // Clean up any old listeners before adding a new one
            document.removeEventListener('click', closeDropdown);
            document.addEventListener('click', closeDropdown);
        }

        function closeDropdown(e) {
            if (!e.target.closest('.status-dropdown')) {
                document.getElementById('status-dropdown').style.display = 'none';
                document.removeEventListener('click', closeDropdown);
            }
        }

        function changeTaskStatus(taskId, newStatus) {
            const task = tasks.find(t => t.id === taskId);
            if (!task || task.status === newStatus) {
                // Ensure dropdown is closed even if no changes
                document.getElementById('status-dropdown').style.display = 'none';
                document.removeEventListener('click', closeDropdown);
                return;
            }
            
            task.history = task.history || [];
            task.history.unshift({ status: newStatus, date: new Date().toISOString() });
            if (task.history.length > 5) task.history.pop();
            
            task.status = newStatus;
            task.manualStatus = newStatus;
            
            saveData();
            renderTasks();
            updateProgressBar();
            
            const toast = document.createElement('div');
            toast.textContent = 'تم حفظ تغيير الحالة بنجاح';
            toast.style = "position:fixed; bottom:20px; right:20px; background:#10B981; color:white; padding:12px 20px; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.2); z-index:1000; transition: opacity 0.3s;";
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
            
            // Fix: Hide and clean up event listener completely
            document.getElementById('status-dropdown').style.display = 'none';
            document.removeEventListener('click', closeDropdown);
        }

        function saveData() {
            const dataToSave = tasks.map(t => ({ id: t.id, manualStatus: t.manualStatus, history: t.history }));
            localStorage.setItem('sepsis-timeline-data-v2', JSON.stringify(dataToSave));
        }

        function loadData() {
            const saved = localStorage.getItem('sepsis-timeline-data-v2');
            if (saved) {
                const parsed = JSON.parse(saved);
                tasks.forEach(t => {
                    const found = parsed.find(p => p.id === t.id);
                    if (found && found.manualStatus) {
                        t.status = found.manualStatus;
                        t.manualStatus = found.manualStatus;
                        t.history = found.history || [];
                    }
                });
            } else {
                tasks.forEach(t => t.status = determineStatus(t));
            }
        }

        function renderLegend() {
            const container = document.getElementById('legend');
            Object.entries(statusColors).forEach(([status, color]) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `<div class="legend-color" style="background:${color}; ${status==='متوقف'?'border:1px solid #ccc':''}"></div> <span style="margin-right:8px; font-size:13px; font-weight:500;">${status}</span>`;
                container.appendChild(item);
            });
        }

        function updateProgressBar() {
            const prog = calculateProgress();
            document.getElementById('progress-bar').style.width = `${prog}%`;
            document.getElementById('progress-text').textContent = `${prog}%`;
        }

        function init() {
            document.getElementById('current-date').textContent = `تاريخ اليوم: ${formatDisplayDate(today)}`;
            loadData();
            
            // Use setTimeout to ensure the DOM is fully rendered before calculating widths
            setTimeout(() => {
                generateYearLabels();
                generateMonthMarkers();
                drawTodayMarker();
                renderTasks();
                renderLegend();
                updateProgressBar();
            }, 50);
            
            window.addEventListener('resize', () => {
                generateYearLabels();
                generateMonthMarkers();
                drawTodayMarker();
                renderTasks();
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
